<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bad Apple!! — 東方Project</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;700;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            color: #fff;
            cursor: none;
        }
        body:hover { cursor: default; }

        /* === Fullscreen Canvas === */
        #dotCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: #050508;
        }

        /* hidden video */
        #videoEl { display: none; }

        /* === Preloader === */
        #preloader {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #050508;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.8s;
        }
        #preloader.hidden { opacity: 0; pointer-events: none; }

        .pre-title {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: 0.2em;
            background: linear-gradient(90deg, #ffb7c5, #fff, #ffb7c5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }
        .pre-sub {
            font-size: 0.8rem;
            color: #555;
            letter-spacing: 0.4em;
            margin-bottom: 2rem;
        }

        .pre-bar-wrap {
            width: 200px;
            height: 2px;
            background: #1a1a2e;
            border-radius: 1px;
            overflow: hidden;
        }
        .pre-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #c0392b, #e74c8b);
            transition: width 0.3s;
        }

        .pre-hint {
            margin-top: 1.5rem;
            font-size: 0.7rem;
            color: #333;
            letter-spacing: 0.2em;
        }

        /* === Overlay Controls (bottom-left, transparent) === */
        #controls {
            position: fixed;
            bottom: 20px; left: 20px;
            display: flex;
            gap: 10px;
            z-index: 50;
            opacity: 0;
            transition: opacity 0.3s;
        }
        body:hover #controls { opacity: 1; }
        /* touch: always visible */
        @media (hover: none) { #controls { opacity: 0.8; } }

        .ctrl-btn {
            width: 40px; height: 40px;
            border: 1px solid rgba(192,57,43,0.4);
            border-radius: 50%;
            background: rgba(10,10,16,0.6);
            backdrop-filter: blur(8px);
            color: #ffb7c5;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .ctrl-btn:hover {
            background: rgba(192,57,43,0.3);
            border-color: rgba(192,57,43,0.7);
            transform: scale(1.1);
        }

        /* === Danmaku === */
        .danmaku-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }
        .danmaku-text {
            position: absolute;
            white-space: nowrap;
            font-size: 14px;
            opacity: 0.04;
            color: #ffb7c5;
            animation: dm-scroll linear infinite;
        }
        @keyframes dm-scroll {
            from { transform: translateX(100vw); }
            to { transform: translateX(-100%); }
        }

        /* === Click to fullscreen hint === */
        #fsHint {
            position: fixed;
            bottom: 70px; left: 20px;
            font-size: 0.65rem;
            color: rgba(255,183,197,0.25);
            letter-spacing: 0.15em;
            z-index: 50;
            opacity: 0;
            transition: opacity 0.3s;
        }
        body:hover #fsHint { opacity: 1; }
        @media (hover: none) { #fsHint { opacity: 0.6; } }
    </style>
</head>
<body>

<!-- Preloader -->
<div id="preloader">
    <div class="pre-title">Bad Apple!!</div>
    <div class="pre-sub">東方 PROJECT</div>
    <div class="pre-bar-wrap"><div class="pre-bar" id="preBar"></div></div>
    <div class="pre-hint">幻想郷を準備中...</div>
</div>

<!-- Danmaku -->
<div class="danmaku-layer" id="danmakuLayer"></div>

<!-- Canvas (fullscreen) -->
<canvas id="dotCanvas"></canvas>

<!-- Hidden video -->
<video id="videoEl" src="badapple.mp4" preload="auto" loop muted playsinline></video>

<!-- Controls -->
<div id="controls">
    <button class="ctrl-btn" id="btnPause" title="Pause">⏸</button>
    <button class="ctrl-btn" id="btnMute" title="Mute">🔇</button>
</div>

<div id="fsHint">CLICK TO FULLSCREEN</div>

<script>
const DOT_COLS = 48;
const DOT_ROWS = 36;
const canvas = document.getElementById('dotCanvas');
const ctx = canvas.getContext('2d');
const video = document.getElementById('videoEl');
const preloader = document.getElementById('preloader');
const preBar = document.getElementById('preBar');
const btnPause = document.getElementById('btnPause');
const btnMute = document.getElementById('btnMute');
const fsHint = document.getElementById('fsHint');

// Touhou palette: deep purple → sakura → white
const PALETTE = [
    [8,8,14],[35,12,48],[60,18,75],[90,22,100],
    [120,28,120],[150,32,135],[175,38,145],[200,50,130],
    [225,75,130],[240,110,140],[248,150,160],[252,185,190],
    [255,210,215],[255,232,235],[255,248,250],[255,255,255],
];

const offscreen = document.createElement('canvas');
offscreen.width = DOT_COLS;
offscreen.height = DOT_ROWS;
const offCtx = offscreen.getContext('2d', { willReadFrequently: true });

let isPlaying = false;
let isMuted = true;
let animId = null;

// --- Resize canvas to fill screen ---
function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// --- Render ---
function renderDots() {
    offCtx.drawImage(video, 0, 0, DOT_COLS, DOT_ROWS);
    const imgData = offCtx.getImageData(0, 0, DOT_COLS, DOT_ROWS).data;

    const W = canvas.width;
    const H = canvas.height;
    const cellW = W / DOT_COLS;
    const cellH = H / DOT_ROWS;
    const gap = Math.max(1.5, Math.min(cellW, cellH) * 0.06);

    ctx.fillStyle = '#050508';
    ctx.fillRect(0, 0, W, H);

    // grid
    ctx.strokeStyle = 'rgba(255,255,255,0.012)';
    ctx.lineWidth = 0.5;
    for (let c = 0; c <= DOT_COLS; c++) {
        ctx.beginPath(); ctx.moveTo(c * cellW, 0); ctx.lineTo(c * cellW, H); ctx.stroke();
    }
    for (let r = 0; r <= DOT_ROWS; r++) {
        ctx.beginPath(); ctx.moveTo(0, r * cellH); ctx.lineTo(W, r * cellH); ctx.stroke();
    }

    for (let row = 0; row < DOT_ROWS; row++) {
        for (let col = 0; col < DOT_COLS; col++) {
            const i = (row * DOT_COLS + col) * 4;
            const brightness = imgData[i] * 0.299 + imgData[i+1] * 0.587 + imgData[i+2] * 0.114;
            const level = Math.round((brightness / 255) * 15);

            const x = col * cellW + gap;
            const y = row * cellH + gap;
            const w = cellW - gap * 2;
            const h = cellH - gap * 2;

            if (level > 1) {
                const c = PALETTE[level];

                if (level > 9) {
                    ctx.fillStyle = `rgba(${c[0]},${c[1]},${c[2]},0.1)`;
                    ctx.fillRect(x - 2, y - 2, w + 4, h + 4);
                }

                ctx.fillStyle = `rgb(${c[0]},${c[1]},${c[2]})`;
                ctx.fillRect(x, y, w, h);

                if (level > 11) {
                    ctx.fillStyle = `rgba(255,255,255,0.12)`;
                    ctx.fillRect(x + 2, y + 2, w * 0.35, h * 0.25);
                }
            } else {
                ctx.fillStyle = 'rgba(255,255,255,0.005)';
                ctx.fillRect(x, y, w, h);
            }
        }
    }
}

function frameLoop() {
    if (!isPlaying || video.paused || video.ended) return;
    renderDots();
    animId = requestAnimationFrame(frameLoop);
}

// --- Controls ---
btnPause.addEventListener('click', (e) => {
    e.stopPropagation();
    if (video.paused) {
        video.play(); isPlaying = true; btnPause.textContent = '⏸';
        frameLoop();
    } else {
        video.pause(); isPlaying = false; btnPause.textContent = '▶';
        if (animId) cancelAnimationFrame(animId);
    }
});

btnMute.addEventListener('click', (e) => {
    e.stopPropagation();
    isMuted = !isMuted;
    video.muted = isMuted;
    btnMute.textContent = isMuted ? '🔇' : '🔊';
});

// --- Click anywhere = fullscreen ---
document.body.addEventListener('click', (e) => {
    if (e.target.closest('#controls')) return;
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen?.();
    }
});

// --- Preload & auto-play ---
video.addEventListener('canplaythrough', () => {
    preBar.style.width = '100%';
    setTimeout(() => {
        preloader.classList.add('hidden');
        video.play();
        isPlaying = true;
        btnPause.textContent = '⏸';
        frameLoop();
    }, 400);
}, { once: true });

// preload progress
video.addEventListener('progress', () => {
    if (video.buffered.length > 0) {
        const pct = (video.buffered.end(video.buffered.length - 1) / video.duration) * 100;
        preBar.style.width = pct + '%';
    }
});

video.addEventListener('ended', () => {
    video.currentTime = 0;
    video.play();
});

// keyboard
document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') { e.preventDefault(); btnPause.click(); }
    else if (e.code === 'KeyM') { btnMute.click(); }
    else if (e.code === 'KeyF') { document.documentElement.requestFullscreen?.(); }
});

// danmaku
(function() {
    const layer = document.getElementById('danmakuLayer');
    const texts = ['ナイスー！','こらー！','やれやれ','www','Bad Apple!!','幻想郷','博麗霊夢',
        '霧雨魔理沙','十六夜咲夜','レミリア','チルノ','⑨','弾幕ごっこしよー！',
        'Unacceptable!!','魔炮','スカーレットディレイン','ZUN','東方Project','Phantasmagoria'];
    for (let i = 0; i < 12; i++) {
        const span = document.createElement('span');
        span.className = 'danmaku-text';
        span.textContent = texts[Math.floor(Math.random() * texts.length)];
        span.style.top = (Math.random() * 100) + '%';
        span.style.animationDuration = (18 + Math.random() * 25) + 's';
        span.style.animationDelay = (-Math.random() * 30) + 's';
        span.style.fontSize = (10 + Math.random() * 8) + 'px';
        layer.appendChild(span);
    }
})();
</script>

</body>
</html>
