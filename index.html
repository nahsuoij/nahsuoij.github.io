<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bad Apple!! — 東方Project Dot Matrix</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;700;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --shrine-red: #c0392b;
            --sakura: #ffb7c5;
            --night: #0a0a12;
            --glow: #e74c8b;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: var(--night);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* === Torii Gate Header === */
        .torii-header {
            position: relative;
            text-align: center;
            padding: 2rem 1rem 1rem;
            background: linear-gradient(180deg, #1a0a1a 0%, var(--night) 100%);
            overflow: hidden;
        }

        .torii-header::before {
            content: '';
            position: absolute;
            top: 0; left: 50%;
            transform: translateX(-50%);
            width: 300px; height: 4px;
            background: var(--shrine-red);
            border-radius: 0 0 2px 2px;
        }
        .torii-header::after {
            content: '';
            position: absolute;
            top: 8px; left: 50%;
            transform: translateX(-50%);
            width: 340px; height: 3px;
            background: var(--shrine-red);
        }

        .site-title {
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 0.15em;
            margin-top: 1.5rem;
            background: linear-gradient(90deg, var(--sakura), #fff, var(--sakura));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .site-subtitle {
            font-size: 0.85rem;
            color: #888;
            margin-top: 0.3rem;
            letter-spacing: 0.3em;
        }

        /* === Danmaku Background === */
        .danmaku-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .danmaku-text {
            position: absolute;
            white-space: nowrap;
            font-size: 14px;
            opacity: 0.06;
            color: var(--sakura);
            animation: danmaku-scroll linear infinite;
        }
        @keyframes danmaku-scroll {
            from { transform: translateX(100vw); }
            to { transform: translateX(-100%); }
        }

        /* === Player Section === */
        .player-section {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 1.5rem auto;
            padding: 0 1rem;
        }

        .player-frame {
            position: relative;
            background: #0d0d15;
            border: 2px solid #222;
            border-radius: 8px;
            overflow: hidden;
            box-shadow:
                0 0 30px rgba(231,76,139,0.1),
                inset 0 0 60px rgba(0,0,0,0.5);
        }

        .player-frame::before {
            content: '博麗神社';
            position: absolute;
            top: 8px; left: 12px;
            font-size: 0.65rem;
            color: var(--shrine-red);
            opacity: 0.5;
            letter-spacing: 0.2em;
            z-index: 2;
        }

        .player-frame::after {
            content: '⛩';
            position: absolute;
            top: 6px; right: 12px;
            font-size: 1rem;
            opacity: 0.3;
            z-index: 2;
        }

        #dotCanvas {
            display: block;
            width: 100%;
            image-rendering: pixelated;
        }

        /* === Controls === */
        .controls {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            background: #111118;
            border-top: 1px solid #1a1a2e;
        }

        .btn-play {
            background: var(--shrine-red);
            border: none;
            color: #fff;
            width: 40px; height: 40px;
            border-radius: 50%;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-play:hover {
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(192,57,43,0.5);
        }

        .progress-bar {
            flex: 1;
            height: 4px;
            background: #222;
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--shrine-red), var(--glow));
            border-radius: 2px;
            width: 0%;
            transition: width 0.1s;
        }

        .time-label {
            font-size: 0.75rem;
            color: #666;
            font-variant-numeric: tabular-nums;
            min-width: 80px;
            text-align: right;
        }

        /* === Info Section === */
        .info-section {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1rem;
            text-align: center;
        }

        .info-card {
            background: linear-gradient(135deg, #12121e, #1a1a2e);
            border: 1px solid #222;
            border-radius: 12px;
            padding: 2rem;
        }

        .info-card h2 {
            font-size: 1.2rem;
            color: var(--sakura);
            margin-bottom: 1rem;
            letter-spacing: 0.1em;
        }

        .info-card p {
            color: #888;
            font-size: 0.85rem;
            line-height: 1.8;
        }

        .badge {
            display: inline-block;
            padding: 0.25rem 0.8rem;
            border: 1px solid var(--shrine-red);
            border-radius: 50px;
            color: var(--shrine-red);
            font-size: 0.7rem;
            margin: 0.3rem;
            letter-spacing: 0.1em;
        }

        /* === Ofuda Decorations === */
        .ofuda {
            position: fixed;
            font-size: 1.5rem;
            opacity: 0.04;
            pointer-events: none;
            z-index: 0;
        }
        .ofuda:nth-child(1) { top: 20%; left: 5%; transform: rotate(-15deg); }
        .ofuda:nth-child(2) { top: 60%; right: 8%; transform: rotate(10deg); }
        .ofuda:nth-child(3) { bottom: 10%; left: 10%; transform: rotate(-5deg); }

        /* === Loading === */
        .loading-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #0d0d15;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: opacity 0.5s;
        }
        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .loading-spinner {
            width: 40px; height: 40px;
            border: 3px solid #222;
            border-top-color: var(--shrine-red);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text {
            margin-top: 1rem;
            color: #666;
            font-size: 0.8rem;
            letter-spacing: 0.15em;
        }

        /* === Footer === */
        footer {
            text-align: center;
            padding: 2rem;
            color: #333;
            font-size: 0.7rem;
            letter-spacing: 0.1em;
        }

        @media (max-width: 600px) {
            .site-title { font-size: 1.3rem; }
            .controls { gap: 0.5rem; padding: 0.8rem; }
        }
    </style>
</head>
<body>

<div class="ofuda">弾幕</div>
<div class="ofuda">結界</div>
<div class="ofuda">夢想</div>

<div class="danmaku-layer" id="danmakuLayer"></div>

<header class="torii-header">
    <div class="site-title">Bad Apple!!</div>
    <div class="site-subtitle">東方 PROJECT — DOT MATRIX PLAYER</div>
</header>

<section class="player-section">
    <div class="player-frame">
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <div class="loading-text" id="loadingText">幻想郷にロード中...</div>
        </div>
        <canvas id="dotCanvas" width="96" height="72"></canvas>
        <div class="controls">
            <button class="btn-play" id="btnPlay" onclick="togglePlay()">▶</button>
            <div class="progress-bar" id="progressBar" onclick="seek(event)">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="time-label" id="timeLabel">0:00 / 0:00</div>
        </div>
    </div>
</section>

<section class="info-section">
    <div class="info-card">
        <h2>✿ 幻想郷より愛を込めて ✿</h2>
        <p>
            「Bad Apple!!」は ZUN の東方Project より。<br>
            この動画は点陣（ドットマトリクス）で描かれています。<br>
            闘え！幻想郷の巫女たち。
        </p>
        <div style="margin-top: 1.2rem;">
            <span class="badge">東方PROJECT</span>
            <span class="badge">BAD APPLE!!</span>
            <span class="badge">DOT MATRIX</span>
            <span class="badge">PHANTASMAGORIA</span>
        </div>
    </div>
</section>

<footer>
    ⛩ 博麗神社 — nahsuoij.github.io ⛩
</footer>

<!-- pako for zlib decompression -->
<script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
<script src="badapple_data.js"></script>
<script>
// === Configuration ===
const COLS = 96;
const ROWS = 72;
const FPS = 10;

// Color palette: light to dark (Touhou-inspired: sakura pink → deep purple → black)
const PALETTE = [
    '#ffffff', '#f8eef8', '#f0ddf0', '#e8cce8',
    '#e0bbe0', '#d8aad8', '#d099d0', '#c888c8',
    '#c077c0', '#b866b8', '#b055b0', '#a844a8',
    '#a033a0', '#9822a8', '#9011b0', '#8800b8',
];

let frameData = [];
let totalFrames = 0;
let currentFrame = 0;
let isPlaying = false;
let lastFrameTime = 0;
let animId = null;

const canvas = document.getElementById('dotCanvas');
const ctx = canvas.getContext('2d');

// Decode the RLE+zlib+base64 frame data
function decodeFrameData() {
    const overlay = document.getElementById('loadingOverlay');
    const loadText = document.getElementById('loadingText');

    loadText.textContent = '圧縮データを展開中...';

    // Decode base64
    const binary = atob(BADAPPLE_DATA);
    const compressed = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) {
        compressed[i] = binary.charCodeAt(i);
    }

    loadText.textContent = 'zlib展開中...';

    // Decompress with zlib
    const decompressed = pako.inflate(compressed);

    loadText.textContent = 'フレーム解析中...';

    // Parse frames
    let offset = 0;
    while (offset < decompressed.length) {
        // Read 2-byte length prefix (big-endian)
        const rleLen = (decompressed[offset] << 8) | decompressed[offset + 1];
        offset += 2;

        const rleData = [];
        for (let i = 0; i < rleLen; i++) {
            const count = decompressed[offset + i * 2];
            const value = decompressed[offset + i * 2 + 1];
            rleData.push([count, value]);
        }
        offset += rleLen * 2;

        frameData.push(rleData);
    }

    totalFrames = frameData.length;
    loadText.textContent = `${totalFrames} フレーム読み込み完了`;
}

// Render a frame from RLE data
function renderFrame(frameRLE) {
    const imgData = ctx.createImageData(COLS, ROWS);
    const pixels = imgData.data;

    let idx = 0;
    for (const [length, value] of frameRLE) {
        for (let i = 0; i < length; i++) {
            const col = idx % COLS;
            const row = Math.floor(idx / COLS);
            const px = (row * COLS + col) * 4;

            // Map 0-15 brightness to palette color
            const colorIdx = 15 - value; // invert: 0=white, 15=black
            const hex = PALETTE[Math.min(colorIdx, 15)];
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);

            pixels[px] = r;
            pixels[px + 1] = g;
            pixels[px + 2] = b;
            pixels[px + 3] = 255;

            idx++;
        }
    }

    ctx.putImageData(imgData, 0, 0);

    // Draw dot matrix overlay
    const dotW = canvas.width / COLS;
    const dotH = canvas.height / ROWS;

    ctx.globalCompositeOperation = 'multiply';
    for (let row = 0; row < ROWS; row++) {
        for (let col = 0; col < COLS; col++) {
            const x = col * dotW + dotW / 2;
            const y = row * dotH + dotH / 2;
            const r = Math.min(dotW, dotH) * 0.4;

            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0,0,0,0.08)';
            ctx.fill();
        }
    }
    ctx.globalCompositeOperation = 'source-over';
}

// Animation Loop
function animate(timestamp) {
    if (!isPlaying) return;

    const interval = 1000 / FPS;
    if (timestamp - lastFrameTime >= interval) {
        renderFrame(frameData[currentFrame]);
        updateUI();
        currentFrame++;
        if (currentFrame >= totalFrames) {
            currentFrame = 0;
        }
        lastFrameTime = timestamp;
    }

    animId = requestAnimationFrame(animate);
}

function togglePlay() {
    if (frameData.length === 0) return;

    isPlaying = !isPlaying;
    const btn = document.getElementById('btnPlay');

    if (isPlaying) {
        btn.textContent = '⏸';
        lastFrameTime = performance.now();
        animId = requestAnimationFrame(animate);
    } else {
        btn.textContent = '▶';
        if (animId) cancelAnimationFrame(animId);
    }
}

function seek(e) {
    if (frameData.length === 0) return;
    const rect = e.target.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    currentFrame = Math.floor(pct * totalFrames);
    renderFrame(frameData[currentFrame]);
    updateUI();
}

function updateUI() {
    const pct = (currentFrame / totalFrames) * 100;
    document.getElementById('progressFill').style.width = pct + '%';

    const elapsed = currentFrame / FPS;
    const total = totalFrames / FPS;
    document.getElementById('timeLabel').textContent =
        formatTime(elapsed) + ' / ' + formatTime(total);
}

function formatTime(s) {
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return m + ':' + (sec < 10 ? '0' : '') + sec;
}

// Danmaku Background
function createDanmaku() {
    const layer = document.getElementById('danmakuLayer');
    const texts = [
        'ナイスー！', 'こらー！', 'やれやれ', 'www',
        'Bad Apple!!', '幻想郷', '博麗霊夢', '霧雨魔理沙',
        '十六夜咲夜', 'レミリア', 'チルノ', '⑨',
        '弾幕ごっこしよー！', 'Unacceptable!!',
        '魔炮', 'スカーレットディレイン', 'ZUN',
        '東方Project', 'Phantasmagoria',
    ];

    for (let i = 0; i < 15; i++) {
        const span = document.createElement('span');
        span.className = 'danmaku-text';
        span.textContent = texts[Math.floor(Math.random() * texts.length)];
        span.style.top = (Math.random() * 100) + '%';
        span.style.animationDuration = (15 + Math.random() * 20) + 's';
        span.style.animationDelay = (-Math.random() * 30) + 's';
        span.style.fontSize = (10 + Math.random() * 8) + 'px';
        layer.appendChild(span);
    }
}

// Init
function init() {
    createDanmaku();

    try {
        decodeFrameData();
    } catch (e) {
        document.getElementById('loadingText').textContent = 'エラー: ' + e.message;
        console.error(e);
        return;
    }

    // Render first frame
    if (frameData.length > 0) {
        renderFrame(frameData[0]);
        updateUI();
    }

    // Hide loading
    setTimeout(() => {
        document.getElementById('loadingOverlay').classList.add('hidden');
    }, 800);

    // Auto-play
    setTimeout(() => {
        togglePlay();
    }, 1500);
}

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
        e.preventDefault();
        togglePlay();
    } else if (e.code === 'ArrowRight') {
        currentFrame = Math.min(currentFrame + FPS, totalFrames - 1);
        renderFrame(frameData[currentFrame]);
        updateUI();
    } else if (e.code === 'ArrowLeft') {
        currentFrame = Math.max(currentFrame - FPS, 0);
        renderFrame(frameData[currentFrame]);
        updateUI();
    }
});

window.addEventListener('load', init);
</script>

</body>
</html>
